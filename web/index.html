<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BillBot 控制台</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #111318; color: #eef2f7; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { width: min(1180px, calc(100% - 32px)); margin: 24px auto 48px; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    h1, h2 { margin: 0; letter-spacing: 0; }
    h1 { font-size: 28px; }
    h2 { font-size: 18px; }
    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panel { background: #1a1f2a; border: 1px solid #303848; border-radius: 8px; padding: 16px; }
    .wide { grid-column: 1 / -1; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    label { display: block; margin: 12px 0 6px; color: #cbd5e1; font-size: 14px; }
    input, textarea, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #46546b; background: #0d1117; color: #f8fafc; font: inherit; }
    textarea { min-height: 104px; resize: vertical; }
    button { min-height: 40px; padding: 10px 14px; border: 0; border-radius: 6px; background: #2f7d6d; color: white; cursor: pointer; font-weight: 650; }
    button.secondary { background: #334155; }
    button.danger { background: #9f3a3a; }
    button:disabled { opacity: .55; cursor: wait; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    .status { margin: 12px 0 0; min-height: 72px; white-space: pre-wrap; background: #0d1117; padding: 12px; border-radius: 6px; border: 1px solid #303848; overflow: auto; }
    .message { min-height: 22px; color: #a7f3d0; margin-top: 10px; }
    .hint { color: #94a3b8; font-size: 13px; margin-top: 8px; }
    @media (max-width: 780px) {
      header, .layout, .grid { grid-template-columns: 1fr; display: grid; }
      header { align-items: stretch; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>BillBot 控制台</h1>
      <button id="refreshBtn" class="secondary">刷新</button>
    </header>

    <div class="layout">
      <section class="panel">
        <h2>服务状态</h2>
        <pre id="health" class="status">加载中...</pre>
      </section>

      <section class="panel">
        <h2>连接器</h2>
        <pre id="connectorStatus" class="status">加载中...</pre>
      </section>

      <section class="panel">
        <h2>桥接服务</h2>
        <pre id="bridgeStatus" class="status">加载中...</pre>
        <div class="actions">
          <button id="startBridgeBtn">启动桥接</button>
          <button id="stopBridgeBtn" class="danger">停止桥接</button>
        </div>
      </section>

      <section class="panel">
        <h2>诊断</h2>
        <pre id="diagnostics" class="status">未检查</pre>
        <div class="actions">
          <button id="diagnosticsBtn" class="secondary">运行诊断</button>
        </div>
      </section>

      <section class="panel wide">
        <h2>系统自启动</h2>
        <pre id="autostartStatus" class="status">加载中...</pre>
        <div class="grid">
          <div><label for="autostart_enabled">配置中启用</label><select id="autostart_enabled"><option value="false">false</option><option value="true">true</option></select></div>
          <div><label for="autostart_name">服务名称</label><input id="autostart_name" autocomplete="off" /></div>
        </div>
        <div class="actions">
          <button id="enableAutostartBtn" class="secondary">启用系统自启动</button>
          <button id="disableAutostartBtn" class="danger">关闭系统自启动</button>
        </div>
      </section>

      <section class="panel wide">
        <h2>基础配置</h2>
        <div class="grid">
          <div><label for="name">机器人名称</label><input id="name" autocomplete="off" /></div>
          <div><label for="port">控制台端口</label><input id="port" type="number" min="1" max="65535" /></div>
          <div><label for="napcat_http">NapCat HTTP</label><input id="napcat_http" autocomplete="off" /></div>
          <div><label for="napcat_ws">NapCat WebSocket</label><input id="napcat_ws" autocomplete="off" /></div>
          <div><label for="hermes_command">Hermes 命令</label><input id="hermes_command" autocomplete="off" /></div>
          <div><label for="bridge_enabled">桥接自动启动</label><select id="bridge_enabled"><option value="false">false</option><option value="true">true</option></select></div>
          <div><label for="self_id">机器人 QQ 号</label><input id="self_id" type="number" min="0" /></div>
        </div>
        <label for="owners">管理员 QQ 号 JSON 数组</label>
        <textarea id="owners" spellcheck="false"></textarea>
      </section>

      <section class="panel wide">
        <h2>NapCat 进程</h2>
        <pre id="napcatProcessStatus" class="status">加载中...</pre>
        <div class="actions">
          <button id="startNapcatBtn" class="secondary">启动 NapCat</button>
          <button id="stopNapcatBtn" class="danger">停止 NapCat</button>
        </div>
        <div class="grid">
          <div><label for="napcat_auto_start">自动启动</label><select id="napcat_auto_start"><option value="false">false</option><option value="true">true</option></select></div>
          <div><label for="napcat_stop_on_exit">桥接停止时关闭</label><select id="napcat_stop_on_exit"><option value="false">false</option><option value="true">true</option></select></div>
          <div><label for="napcat_command">启动命令</label><input id="napcat_command" autocomplete="off" /></div>
          <div><label for="napcat_work_dir">工作目录</label><input id="napcat_work_dir" autocomplete="off" /></div>
          <div><label for="napcat_wait_http">就绪检测 HTTP</label><input id="napcat_wait_http" autocomplete="off" /></div>
          <div><label for="napcat_wait_timeout">就绪等待秒数</label><input id="napcat_wait_timeout" type="number" min="1" /></div>
        </div>
        <label for="napcat_args">启动参数 JSON 数组</label>
        <textarea id="napcat_args" spellcheck="false"></textarea>
      </section>

      <section class="panel wide">
        <h2>模型分流</h2>
        <div class="grid">
          <div><label for="default_provider">默认 API/Provider</label><input id="default_provider" autocomplete="off" /></div>
          <div><label for="default_model">默认模型</label><input id="default_model" autocomplete="off" /></div>
          <div><label for="base_provider">基础 API/Provider</label><input id="base_provider" autocomplete="off" /></div>
          <div><label for="base_model">基础模型</label><input id="base_model" autocomplete="off" /></div>
          <div><label for="strong_provider">强推理 API/Provider</label><input id="strong_provider" autocomplete="off" /></div>
          <div><label for="strong_model">强推理模型</label><input id="strong_model" autocomplete="off" /></div>
          <div><label for="special_model">特殊指令模型</label><input id="special_model" autocomplete="off" /></div>
          <div><label for="routing_timeout">分流超时秒数</label><input id="routing_timeout" type="number" min="1" /></div>
          <div><label for="flash_timeout">快速模型超时秒数</label><input id="flash_timeout" type="number" min="1" /></div>
          <div><label for="heavy_timeout">强推理超时秒数</label><input id="heavy_timeout" type="number" min="1" /></div>
        </div>
      </section>

      <section class="panel">
        <h2>安全策略</h2>
        <label for="mode">安全模式</label>
        <select id="mode"><option value="sandbox">sandbox</option><option value="full">full</option></select>
        <label for="group_mentions_only">群聊响应</label>
        <select id="group_mentions_only"><option value="true">仅被 @ 时响应</option><option value="false">响应所有群消息</option></select>
        <label for="disable_tools">沙盒工具</label>
        <select id="disable_tools"><option value="true">沙盒中禁用工具</option><option value="false">使用 Hermes 默认设置</option></select>
      </section>

      <section class="panel">
        <h2>运行时</h2>
        <label for="start_notice_delay">工作提示延迟秒数</label>
        <input id="start_notice_delay" type="number" min="1" />
        <label for="progress_interval">进度提示间隔秒数</label>
        <input id="progress_interval" type="number" min="1" />
        <label for="max_turns">单会话最大轮数</label>
        <input id="max_turns" type="number" min="1" />
      </section>

      <section class="panel">
        <h2>QQ 登录二维码</h2>
        <label for="qr_command">二维码命令 JSON 数组</label>
        <textarea id="qr_command" spellcheck="false"></textarea>
        <label for="login_status_command">登录状态命令 JSON 数组</label>
        <textarea id="login_status_command" spellcheck="false"></textarea>
        <label for="qr_timeout">二维码命令超时秒数</label>
        <input id="qr_timeout" type="number" min="1" />
        <div class="actions">
          <button id="qrBtn" class="secondary">渲染二维码</button>
          <button id="loginStatusBtn" class="secondary">检查登录状态</button>
        </div>
        <pre id="qrOutput" class="status">未渲染</pre>
      </section>

      <section class="panel wide">
        <h2>提示词和指令</h2>
        <label for="identity">身份设定</label>
        <textarea id="identity"></textarea>
        <label for="style">回复风格</label>
        <textarea id="style"></textarea>
        <label for="commands">指令 JSON 数组</label>
        <textarea id="commands" spellcheck="false"></textarea>
        <div class="actions"><button id="saveBtn">保存配置</button></div>
        <div id="message" class="message"></div>
        <div class="hint">修改控制台端口后需要重启 BillBot。</div>
      </section>

      <section class="panel wide">
        <h2>运行日志</h2>
        <pre id="logs" class="status">未加载</pre>
        <div class="actions">
          <button id="logsBtn" class="secondary">加载日志</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    let current = null
    const el = id => document.getElementById(id)

    async function getJSON(url) {
      const res = await fetch(url)
      if (!res.ok) throw new Error(await res.text())
      return res.json()
    }

    async function postJSON(url, payload = {}) {
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
      if (!res.ok) throw new Error(await res.text())
      return res.json()
    }

    async function refresh() {
      const [health, cfg, connector, bridge, napcatProcess, autostart] = await Promise.all([
        getJSON('/api/health'), getJSON('/api/config'), getJSON('/api/connectors/status'), getJSON('/api/bridge/status'), getJSON('/api/processes/napcat/status'), getJSON('/api/autostart/status')
      ])
      current = cfg.config
      el('health').textContent = JSON.stringify(health, null, 2)
      el('connectorStatus').textContent = JSON.stringify(connector.connectors, null, 2)
      el('bridgeStatus').textContent = JSON.stringify(bridge.bridge, null, 2)
      el('napcatProcessStatus').textContent = JSON.stringify(napcatProcess.napcat_process, null, 2)
      el('autostartStatus').textContent = JSON.stringify(autostart.autostart, null, 2)

      el('name').value = current.name || ''
      el('port').value = current.server?.port || 2006
      el('napcat_http').value = current.napcat?.http || ''
      el('napcat_ws').value = current.napcat?.ws || ''
      el('hermes_command').value = current.hermes?.command || 'hermes'
      el('bridge_enabled').value = String(current.bridge?.enabled ?? false)
      el('autostart_enabled').value = String(current.autostart?.enabled ?? false)
      el('autostart_name').value = current.autostart?.name || 'BillBot'
      el('self_id').value = current.bridge?.self_id || 0
      el('owners').value = JSON.stringify(current.owners || [], null, 2)
      el('default_provider').value = current.models?.default_provider || ''
      el('default_model').value = current.models?.default_model || ''
      el('base_provider').value = current.models?.base_provider || ''
      el('base_model').value = current.models?.base_model || ''
      el('strong_provider').value = current.models?.strong_provider || ''
      el('strong_model').value = current.models?.strong_model || ''
      el('special_model').value = current.models?.special_model || ''
      el('routing_timeout').value = current.models?.routing_timeout_sec || 30
      el('flash_timeout').value = current.models?.flash_timeout_sec || 90
      el('heavy_timeout').value = current.models?.heavy_timeout_sec || 300
      el('identity').value = current.prompt?.identity || ''
      el('style').value = current.prompt?.style || ''
      el('commands').value = JSON.stringify(current.commands || [], null, 2)
      el('mode').value = current.security?.mode || 'sandbox'
      el('group_mentions_only').value = String(current.bridge?.respond_to_group_mentions_only ?? true)
      el('disable_tools').value = String(current.hermes?.disable_tools_in_sandbox ?? true)
      el('start_notice_delay').value = current.runtime?.start_notice_delay_sec || 6
      el('progress_interval').value = current.runtime?.progress_interval_sec || 25
      el('max_turns').value = current.runtime?.max_turns || 120
      el('qr_command').value = JSON.stringify(current.login?.qr_command || [], null, 2)
      el('login_status_command').value = JSON.stringify(current.login?.status_command || [], null, 2)
      el('qr_timeout').value = current.login?.qr_timeout_sec || 30
      const proc = current.processes?.napcat || {}
      el('napcat_auto_start').value = String(proc.auto_start ?? false)
      el('napcat_stop_on_exit').value = String(proc.stop_on_exit ?? false)
      el('napcat_command').value = proc.command || ''
      el('napcat_work_dir').value = proc.work_dir || ''
      el('napcat_wait_http').value = proc.wait_http || ''
      el('napcat_wait_timeout').value = proc.wait_timeout_sec || 30
      el('napcat_args').value = JSON.stringify(proc.args || [], null, 2)
    }

    async function saveConfig() {
      const button = el('saveBtn')
      const message = el('message')
      button.disabled = true
      message.textContent = ''
      try {
        const owners = JSON.parse(el('owners').value || '[]')
        const commands = JSON.parse(el('commands').value || '[]')
        const qrCommand = JSON.parse(el('qr_command').value || '[]')
        const loginStatusCommand = JSON.parse(el('login_status_command').value || '[]')
        const napcatArgs = JSON.parse(el('napcat_args').value || '[]')
        if (!Array.isArray(owners) || !Array.isArray(commands) || !Array.isArray(qrCommand) || !Array.isArray(loginStatusCommand) || !Array.isArray(napcatArgs)) {
          throw new Error('JSON 数组字段格式不正确')
        }
        const payload = structuredClone(current || {})
        payload.name = el('name').value
        payload.server = payload.server || {}
        payload.server.port = Number(el('port').value || 2006)
        payload.napcat = payload.napcat || {}
        payload.napcat.http = el('napcat_http').value
        payload.napcat.ws = el('napcat_ws').value
        payload.processes = payload.processes || {}
        payload.processes.napcat = payload.processes.napcat || {}
        payload.processes.napcat.auto_start = el('napcat_auto_start').value === 'true'
        payload.processes.napcat.stop_on_exit = el('napcat_stop_on_exit').value === 'true'
        payload.processes.napcat.command = el('napcat_command').value
        payload.processes.napcat.args = napcatArgs.map(String)
        payload.processes.napcat.work_dir = el('napcat_work_dir').value
        payload.processes.napcat.wait_http = el('napcat_wait_http').value
        payload.processes.napcat.wait_timeout_sec = Number(el('napcat_wait_timeout').value || 30)
        payload.hermes = payload.hermes || {}
        payload.hermes.command = el('hermes_command').value
        payload.hermes.disable_tools_in_sandbox = el('disable_tools').value === 'true'
        payload.bridge = payload.bridge || {}
        payload.bridge.enabled = el('bridge_enabled').value === 'true'
        payload.bridge.self_id = Number(el('self_id').value || 0)
        payload.bridge.respond_to_group_mentions_only = el('group_mentions_only').value === 'true'
        payload.login = payload.login || {}
        payload.login.qr_command = qrCommand.map(String)
        payload.login.status_command = loginStatusCommand.map(String)
        payload.login.qr_timeout_sec = Number(el('qr_timeout').value || 30)
        payload.models = payload.models || {}
        payload.models.default_provider = el('default_provider').value
        payload.models.default_model = el('default_model').value
        payload.models.base_provider = el('base_provider').value
        payload.models.base_model = el('base_model').value
        payload.models.strong_provider = el('strong_provider').value
        payload.models.strong_model = el('strong_model').value
        payload.models.special_model = el('special_model').value
        payload.models.routing_timeout_sec = Number(el('routing_timeout').value || 30)
        payload.models.flash_timeout_sec = Number(el('flash_timeout').value || 90)
        payload.models.heavy_timeout_sec = Number(el('heavy_timeout').value || 300)
        payload.runtime = payload.runtime || {}
        payload.runtime.start_notice_delay_sec = Number(el('start_notice_delay').value || 6)
        payload.runtime.progress_interval_sec = Number(el('progress_interval').value || 25)
        payload.runtime.max_turns = Number(el('max_turns').value || 120)
        payload.owners = owners.map(Number)
        payload.prompt = payload.prompt || {}
        payload.prompt.identity = el('identity').value
        payload.prompt.style = el('style').value
        payload.commands = commands
        payload.security = payload.security || {}
        payload.security.mode = el('mode').value
        payload.autostart = payload.autostart || {}
        payload.autostart.enabled = el('autostart_enabled').value === 'true'
        payload.autostart.name = el('autostart_name').value
        const out = await postJSON('/api/config', payload)
        current = out.config
        message.textContent = '已保存'
        await refresh()
      } catch (err) {
        message.textContent = String(err.message || err)
      } finally {
        button.disabled = false
      }
    }

    async function bridgeAction(action) {
      el('message').textContent = ''
      try { await postJSON(`/api/bridge/${action}`); await refresh() } catch (err) { el('message').textContent = String(err.message || err) }
    }

    async function napcatAction(action) {
      el('message').textContent = ''
      try { await postJSON(`/api/processes/napcat/${action}`); await refresh() } catch (err) { el('message').textContent = String(err.message || err) }
    }

    async function autostartAction(action) {
      el('message').textContent = ''
      try { await postJSON(`/api/autostart/${action}`); await refresh() } catch (err) { el('message').textContent = String(err.message || err) }
    }

    async function runDiagnostics() {
      el('diagnostics').textContent = '检查中...'
      try { const out = await getJSON('/api/diagnostics'); el('diagnostics').textContent = JSON.stringify(out.diagnostics, null, 2) } catch (err) { el('diagnostics').textContent = String(err.message || err) }
    }

    async function renderQR() {
      el('qrOutput').textContent = '渲染中...'
      try { const out = await postJSON('/api/login/qr'); el('qrOutput').textContent = out.qr.render } catch (err) { el('qrOutput').textContent = String(err.message || err) }
    }

    async function loginStatus() {
      el('qrOutput').textContent = '正在检查登录状态...'
      try { const out = await getJSON('/api/login/status'); el('qrOutput').textContent = JSON.stringify(out.login, null, 2) } catch (err) { el('qrOutput').textContent = String(err.message || err) }
    }

    async function loadLogs() {
      el('logs').textContent = '加载中...'
      try { const out = await getJSON('/api/logs'); el('logs').textContent = out.log } catch (err) { el('logs').textContent = String(err.message || err) }
    }

    el('refreshBtn').onclick = () => refresh().catch(err => { el('health').textContent = String(err.message || err) })
    el('saveBtn').onclick = saveConfig
    el('startBridgeBtn').onclick = () => bridgeAction('start')
    el('stopBridgeBtn').onclick = () => bridgeAction('stop')
    el('startNapcatBtn').onclick = () => napcatAction('start')
    el('stopNapcatBtn').onclick = () => napcatAction('stop')
    el('enableAutostartBtn').onclick = () => autostartAction('enable')
    el('disableAutostartBtn').onclick = () => autostartAction('disable')
    el('diagnosticsBtn').onclick = runDiagnostics
    el('qrBtn').onclick = renderQR
    el('loginStatusBtn').onclick = loginStatus
    el('logsBtn').onclick = loadLogs
    refresh().catch(err => {
      el('health').textContent = String(err.message || err)
      el('connectorStatus').textContent = String(err.message || err)
      el('bridgeStatus').textContent = String(err.message || err)
    })
  </script>
</body>
</html>
