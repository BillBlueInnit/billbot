name: ""
server:
  host: 0.0.0.0
  port: 2006
runtime:
  data_dir: ""
  log_file: ""
  outbox_dir: ""
  tmp_dir: ""
  sandbox_dir: ""
  save_interval_sec: 10
  start_notice_delay_sec: 6
  progress_interval_sec: 25
  max_turns: 120
connector:
  mode: external
  name: napcat
napcat:
  http: http://127.0.0.1:3000
  ws: ws://127.0.0.1:3001
